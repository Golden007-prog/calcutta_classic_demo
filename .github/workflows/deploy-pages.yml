name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Intercepting routes need a server; the dish modal degrades to its
      # full page on the static export (soft navs go straight to /menu/[slug]).
      - name: Strip server-only routes for static export
        run: rm -rf "app/menu/@modal"

      - name: Build static export
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://golden007-prog.github.io/calcutta_classic_demo
          NEXT_PUBLIC_SUPABASE_URL: https://vnfbugpjijlxgfwnciwy.supabase.co
          # Publishable key — safe for browsers by design.
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_6T1TnHoEvlNeUuqn2Co3ZQ_u80p8VlB
          NEXT_PUBLIC_ENABLE_AUTH: "false"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
